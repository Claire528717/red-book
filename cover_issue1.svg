<svg viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <!-- 底色：暖米黄 -->
  <rect width="680" height="860" fill="#F5EBDA"/>
  <!-- 方格底纹（记事本纸感） -->
  <g stroke="#3A2A1A" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="0" y1="40" x2="680" y2="40"/>
    <line x1="0" y1="80" x2="680" y2="80"/>
    <line x1="0" y1="120" x2="680" y2="120"/>
    <line x1="0" y1="160" x2="680" y2="160"/>
    <line x1="0" y1="200" x2="680" y2="200"/>
    <line x1="0" y1="240" x2="680" y2="240"/>
    <line x1="0" y1="280" x2="680" y2="280"/>
    <line x1="0" y1="320" x2="680" y2="320"/>
    <line x1="0" y1="360" x2="680" y2="360"/>
    <line x1="0" y1="400" x2="680" y2="400"/>
    <line x1="0" y1="440" x2="680" y2="440"/>
    <line x1="0" y1="480" x2="680" y2="480"/>
    <line x1="0" y1="520" x2="680" y2="520"/>
    <line x1="0" y1="560" x2="680" y2="560"/>
    <line x1="0" y1="600" x2="680" y2="600"/>
    <line x1="0" y1="640" x2="680" y2="640"/>
    <line x1="0" y1="680" x2="680" y2="680"/>
    <line x1="0" y1="720" x2="680" y2="720"/>
    <line x1="0" y1="760" x2="680" y2="760"/>
    <line x1="0" y1="800" x2="680" y2="800"/>
  </g>

  <!-- 装饰胶带（顶部） -->
  <rect x="0" y="0" width="680" height="18" fill="#C97B3F" fill-opacity="0.7"/>
  <rect x="0" y="0" width="680" height="18" fill="#3A2A1A" fill-opacity="0.15"/>

  <!-- 顶部标识：第 1 期 · 你说我做 · 48h出Demo -->
  <text x="340" y="54" text-anchor="middle" font-size="16" font-weight="600" fill="#3A2A1A" letter-spacing="2">第 1 期 · 你说我做 · 48h出Demo</text>

  <!-- 第一张便签：问题描述 -->
  <g transform="translate(80, 90)">
    <rect width="520" height="180" rx="4" fill="#FFFFFF" stroke="#3A2A1A" stroke-width="1" stroke-opacity="0.3"/>
    <!-- 便签顶部色条 -->
    <rect width="520" height="6" fill="#C97B3F" fill-opacity="0.8"/>
    <!-- 侧边胶带装饰 -->
    <rect x="0" y="30" width="18" height="50" fill="#C97B3F" fill-opacity="0.2"/>
    <!-- 问题标签 -->
    <rect x="20" y="20" width="64" height="24" rx="12" fill="#C97B3F"/>
    <text x="52" y="37" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">问题</text>
    <!-- 主文案 -->
    <text x="100" y="80" font-size="32" font-weight="700" fill="#3A2A1A" letter-spacing="1">明明有想法</text>
    <text x="100" y="128" font-size="32" font-weight="700" fill="#3A2A1A" letter-spacing="1">但迈不出第一步</text>
    <!-- 手写感小字 -->
    <text x="100" y="170" font-size="14" fill="#7A5A3A" font-style="italic">—— 你是不是也这样？</text>
  </g>

  <!-- 箭头 -->
  <g stroke="#C97B3F" stroke-width="2.5" fill="none" stroke-linecap="round">
    <line x1="340" y1="276" x2="340" y2="308"/>
    <polygon points="333,304 340,316 347,304" fill="#C97B3F"/>
  </g>

  <!-- 第二张便签：解决方案 -->
  <g transform="translate(80, 324)">
    <rect width="520" height="180" rx="4" fill="#FBF3E0"/>
    <rect width="520" height="6" fill="#7A5A3A" fill-opacity="0.7"/>
    <rect x="502" y="30" width="18" height="50" fill="#7A5A3A" fill-opacity="0.15"/>
    <!-- 方案标签 -->
    <rect x="20" y="20" width="64" height="24" rx="12" fill="#7A5A3A"/>
    <text x="52" y="37" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">方案</text>
    <!-- 方案文字 -->
    <text x="100" y="80" font-size="28" font-weight="600" fill="#3A2A1A" letter-spacing="1">你说，我做。</text>
    <text x="100" y="124" font-size="28" font-weight="600" fill="#C97B3F" letter-spacing="1">48 小时给你 Demo。</text>
  </g>

  <!-- 底部行动区：手绘感装饰线 -->
  <line x1="80" y1="530" x2="600" y2="530" stroke="#C97B3F" stroke-width="1" stroke-dasharray="8,4" stroke-opacity="0.6"/>

  <!-- 评论区行动提示 -->
  <g transform="translate(80, 548)">
    <rect width="520" height="72" rx="8" fill="none" stroke="#3A2A1A" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="260" y="46" text-anchor="middle" font-size="20" font-weight="600" fill="#3A2A1A" letter-spacing="2">评论区 · 写下你的想法</text>
  </g>

  <!-- 底部脚注 -->
  <text x="340" y="678" text-anchor="middle" font-size="13" fill="#7A5A3A">你的故事，第一个开始 👇</text>

  <!-- 装饰：右下角小圆点几何 -->
  <g fill="#C97B3F" fill-opacity="0.15">
    <circle cx="580" cy="720" r="80"/>
    <circle cx="600" cy="760" r="50"/>
  </g>
  <g stroke="#C97B3F" stroke-width="1.5" fill="none" stroke-opacity="0.25">
    <circle cx="580" cy="720" r="60"/>
    <circle cx="600" cy="760" r="35"/>
  </g>
  <g transform="translate(180, 820)">
    <rect width="320" height="30" rx="4" fill="#C97B3F" fill-opacity="0.9"/>
    <text x="160" y="20" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF" letter-spacing="3">共 6 期 · 免费</text>
  </g>

  <!-- 底部装饰胶带 -->
  <rect x="0" y="842" width="680" height="18" fill="#C97B3F" fill-opacity="0.7"/>
  <rect x="0" y="842" width="680" height="18" fill="#3A2A1A" fill-opacity="0.15"/>
</svg>